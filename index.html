<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaSave Pro - HD Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: #fff; }
        .saas-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 2rem; }
        .accent-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .tab-active { background: #1a1a1a; color: #fff; border-bottom: 3px solid #6366f1; }
        .loader-spin { border: 3px solid #1a1a1a; border-top: 3px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <!-- Nav -->
    <nav class="max-w-6xl mx-auto p-6 flex justify-between items-center">
        <div class="text-2xl font-extrabold italic tracking-tighter">MEDIA<span class="text-indigo-500">X</span></div>
        <div class="bg-green-500/10 text-green-500 px-3 py-1 rounded-full text-[10px] font-bold">SERVER ACTIVE</div>
    </nav>

    <!-- Main -->
    <main class="max-w-4xl mx-auto px-4 mt-8">
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-6xl font-black mb-4">Master <span class="text-indigo-500">Downloader</span></h1>
            <p class="text-gray-500">YouTube 1080p, Instagram Reels & FB Videos.</p>
        </div>

        <!-- Platform Tabs -->
        <div class="flex justify-center border-b border-zinc-800 mb-8">
            <button onclick="setTab('youtube')" id="tab-youtube" class="px-8 py-4 font-bold text-gray-500 transition-all tab-active">YouTube</button>
            <button onclick="setTab('instagram')" id="tab-instagram" class="px-8 py-4 font-bold text-gray-500 transition-all">Instagram</button>
            <button onclick="setTab('facebook')" id="tab-facebook" class="px-8 py-4 font-bold text-gray-500 transition-all">Facebook</button>
        </div>

        <!-- Tool Box -->
        <div class="saas-card p-6 md:p-10">
            <div class="flex flex-col gap-6">
                <div>
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-1">Video Link</label>
                    <input type="text" id="videoUrl" oninput="getMeta()" placeholder="Paste YouTube link here..." 
                    class="w-full bg-black border border-zinc-800 p-5 rounded-2xl mt-2 outline-none focus:border-indigo-500 transition-all text-lg">
                </div>

                <!-- Preview Area (Automatically shows when link is pasted) -->
                <div id="metaPreview" class="hidden flex flex-col md:flex-row gap-6 p-4 bg-zinc-900/50 rounded-2xl border border-zinc-800">
                    <img id="vThumb" src="" class="w-full md:w-40 rounded-xl object-cover shadow-2xl">
                    <div class="flex-1">
                        <h3 id="vTitle" class="font-bold text-lg leading-tight mb-2">Video Title Loading...</h3>
                        <p id="vDesc" class="text-xs text-zinc-500 line-clamp-2 mb-4"></p>
                    </div>
                </div>

                <div class="flex flex-col md:flex-row gap-4">
                    <select id="quality" class="bg-zinc-900 text-white p-5 rounded-2xl outline-none border border-zinc-800 flex-1">
                        <option value="1080">1080p Full HD</option>
                        <option value="720">720p HD</option>
                        <option value="480">480p SD</option>
                        <option value="mp3">Audio (MP3)</option>
                    </select>

                    <button onclick="startDownload()" id="dlBtn" class="accent-gradient px-12 py-5 rounded-2xl font-black uppercase flex items-center justify-center gap-3">
                        <span id="btnText">Download Now</span>
                        <div id="loader" class="loader-spin hidden"></div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Instruction -->
        <div class="mt-20 grid grid-cols-1 md:grid-cols-3 gap-6 opacity-50 text-center text-xs">
            <div><i class="fa-solid fa-bolt mb-2 text-indigo-500"></i><p>HIGH SPEED SERVERS</p></div>
            <div><i class="fa-solid fa-shield-check mb-2 text-indigo-500"></i><p>ENCRYPTED DOWNLOADS</p></div>
            <div><i class="fa-solid fa-star mb-2 text-indigo-500"></i><p>NO ADS / NO REDIRECTS</p></div>
        </div>
    </main>

    <script>
        let currentTab = 'youtube';

        function setTab(t) {
            currentTab = t;
            document.querySelectorAll('button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + t).classList.add('tab-active');
            document.getElementById('videoUrl').placeholder = `Paste ${t} link here...`;
            document.getElementById('metaPreview').classList.add('hidden');
        }

        // Automatic Metadata Fetch (Thumbnail & Title)
        async function getMeta() {
            const url = document.getElementById('videoUrl').value;
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const id = url.split('v=')[1]?.split('&')[0] || url.split('/').pop().split('?')[0];
                if (id && id.length === 11) {
                    document.getElementById('vThumb').src = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
                    document.getElementById('metaPreview').classList.remove('hidden');
                    
                    // Fetch Title
                    try {
                        const res = await fetch(`https://noembed.com/embed?url=${url}`);
                        const data = await res.json();
                        document.getElementById('vTitle').innerText = data.title;
                    } catch (e) {
                        document.getElementById('vTitle').innerText = "YouTube Video Found";
                    }
                }
            }
        }

        function startDownload() {
            const url = document.getElementById('videoUrl').value;
            const quality = document.getElementById('quality').value;
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');

            if (!url) return alert("Please paste a link!");

            // Show Loading
            btnText.style.display = 'none';
            loader.classList.remove('hidden');

            // --- STABLE REDIRECT ENGINE (India Fixed) ---
            // Yahan hum aisi service use kar rahe hain jo blocked nahi hai
            setTimeout(() => {
                let finalLink = "";
                
                if (currentTab === 'youtube') {
                    // Using Yt1s Style Secure Engine
                    finalLink = `https://y2mate.nu/api/button/${quality}?url=${encodeURIComponent(url)}`;
                } else {
                    // Instagram / Facebook Engine
                    finalLink = `https://snapsave.app/download?url=${encodeURIComponent(url)}`;
                }

                // Redirect in the same system
                window.location.href = finalLink;

                // Reset Button after 3 seconds
                setTimeout(() => {
                    btnText.style.display = 'block';
                    loader.classList.add('hidden');
                }, 3000);
            }, 1000);
        }
    </script>
</body>
</html>
