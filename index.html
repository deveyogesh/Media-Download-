<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaSave - 1080p HD Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-active { background: #4f46e5; border-color: #6366f1; color: white; }
        .gradient-btn { background: linear-gradient(90deg, #4f46e5, #9333ea); transition: all 0.3s ease; }
        .gradient-btn:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(79, 70, 229, 0.5); }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header -->
    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <div class="text-2xl font-extrabold tracking-tighter">MEDIA<span class="text-indigo-500">SAVER</span></div>
        <div class="hidden md:block text-xs font-bold text-slate-500 uppercase tracking-widest">High Speed 1080p Engine</div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 pt-10">
        <!-- Hero -->
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-4">No Limits. <span class="text-indigo-500">Just HD.</span></h1>
            <p class="text-slate-400">Download YouTube, Instagram & Facebook videos in original quality.</p>
        </div>

        <!-- Platform Tabs -->
        <div class="grid grid-cols-3 gap-2 mb-6">
            <button onclick="switchTab('youtube')" id="tab-youtube" class="tab-btn py-4 rounded-2xl font-bold border border-slate-800 glass transition-all flex flex-col items-center gap-1 tab-active">
                <i class="fa-brands fa-youtube text-xl"></i><span class="text-[10px] uppercase">YouTube</span>
            </button>
            <button onclick="switchTab('instagram')" id="tab-instagram" class="tab-btn py-4 rounded-2xl font-bold border border-slate-800 glass transition-all flex flex-col items-center gap-1">
                <i class="fa-brands fa-instagram text-xl text-pink-500"></i><span class="text-[10px] uppercase">Instagram</span>
            </button>
            <button onclick="switchTab('facebook')" id="tab-facebook" class="tab-btn py-4 rounded-2xl font-bold border border-slate-800 glass transition-all flex flex-col items-center gap-1">
                <i class="fa-brands fa-facebook text-xl text-blue-500"></i><span class="text-[10px] uppercase">Facebook</span>
            </button>
        </div>

        <!-- Tool Card -->
        <div class="glass rounded-[2rem] p-6 md:p-10 shadow-2xl">
            <div class="space-y-6">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase ml-2">Video URL</label>
                    <input type="text" id="videoUrl" placeholder="Paste link here..." 
                    class="w-full bg-slate-900/50 border border-slate-700 p-5 rounded-2xl mt-2 outline-none focus:border-indigo-500 transition-all text-lg">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase ml-2">Format & Quality</label>
                        <select id="quality" class="w-full bg-slate-900/50 border border-slate-700 p-5 rounded-2xl mt-2 outline-none appearance-none">
                            <option value="1080">MP4 - 1080p (Full HD)</option>
                            <option value="720">MP4 - 720p (HD)</option>
                            <option value="480">MP4 - 480p</option>
                            <option value="mp3">MP3 - Audio Only</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button onclick="processDownload()" class="w-full gradient-btn text-white font-black py-5 rounded-2xl uppercase tracking-wider text-lg">
                            Fetch Download Link
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Hidden Forms (Engines) -->
        <form id="ytForm" action="https://loader.to/api/button/" method="GET" target="_blank" class="hidden">
            <input type="hidden" name="url" id="ytUrl">
            <input type="hidden" name="f" id="ytFormat">
        </form>

        <form id="socialForm" action="https://en.savefrom.net/1-youtube-video-downloader-383/" method="GET" target="_blank" class="hidden">
            <input type="hidden" name="url" id="socialUrl">
        </form>

        <!-- Result Status (Optional) -->
        <div id="status" class="hidden mt-10 text-center animate-bounce">
            <p class="text-indigo-400 font-bold">🚀 Opening Download Portal...</p>
        </div>

        <!-- Features -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-20 opacity-50">
            <div class="text-center"><i class="fa-solid fa-bolt mb-2"></i><p class="text-[10px]">Instant</p></div>
            <div class="text-center"><i class="fa-solid fa-shield-heart mb-2"></i><p class="text-[10px]">Safe</p></div>
            <div class="text-center"><i class="fa-solid fa-video mb-2"></i><p class="text-[10px]">1080p</p></div>
            <div class="text-center"><i class="fa-solid fa-mobile mb-2"></i><p class="text-[10px]">Mobile</p></div>
        </div>
    </main>

    <footer class="p-10 text-center text-slate-600 text-xs mt-10 border-t border-slate-900">
        © 2024 MediaSaver SAAS Kit. All Rights Reserved.
    </footer>

    <script>
        let activeTab = 'youtube';

        function switchTab(platform) {
            activeTab = platform;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-' + platform).classList.add('tab-active');
            document.getElementById('videoUrl').value = '';
            document.getElementById('videoUrl').placeholder = `Paste ${platform} video link...`;
        }

        function processDownload() {
            const url = document.getElementById('videoUrl').value;
            const quality = document.getElementById('quality').value;
            
            if (!url) {
                alert("Please paste a valid video link!");
                return;
            }

            document.getElementById('status').classList.remove('hidden');

            setTimeout(() => {
                if (activeTab === 'youtube') {
                    // YouTube 1080p Engine Submission
                    document.getElementById('ytUrl').value = url;
                    document.getElementById('ytFormat').value = quality;
                    document.getElementById('ytForm').submit();
                } else {
                    // Instagram & Facebook Engine Submission
                    // Ye engine link ko direct process kar dega
                    const socialUrl = "https://savefrom.net/?url=" + encodeURIComponent(url);
                    window.open(socialUrl, '_blank');
                }
                
                document.getElementById('status').classList.add('hidden');
            }, 800);
        }
    </script>
</body>
</html>
